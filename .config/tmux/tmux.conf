set-option -g default-command "bash -i"
set -g mouse on
set -g extended-keys on
set -g set-clipboard on
set -g allow-passthrough all

# Active/inactive pane dimming
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=default,bg=colour234'

# Pane borders with labels
set -g pane-border-style "fg=colour238 bg=colour236"
set -g pane-active-border-style "fg=blue bg=colour236"
set -g pane-border-format ' #[bold]#P #[default]#{?pane_title,#{pane_title},#{pane_current_command}} '
set -g pane-border-status top

# Ctrl+Shift+Arrow pane navigation
bind -n C-S-Left select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up select-pane -U
bind -n C-S-Down select-pane -D

set -ga terminal-overrides ",screen-256color*:Tc"
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -ga update-environment "TERM_PROGRAM"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=colour236 fg=#689d6a'

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


